<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mi Portafolio</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💻</text></svg>">
</head>
<body>
  <header>
    <div class="container">
      <h1>Mi Portafolio</h1>
      <p class="subtitle">Proyectos personales y programitas</p>
      <nav>
        <a href="#proyectos">Proyectos</a>
        <a href="#programitas">Programitas</a>
        <a href="#sobre-mi">Sobre mí</a>
      </nav>
    </div>
  </header>

  <main class="container">
    <section id="proyectos">
      <h2>Proyectos</h2>
      <div class="grid" id="proyectos-grid"></div>
    </section>

    <section id="programitas">
      <h2>Programitas</h2>
      <div class="grid" id="programitas-grid"></div>
    </section>

    <section id="sobre-mi">
      <h2>Sobre mí</h2>
      <div class="card about">
        <p>Hola! Soy un desarrollador apasionado por la tecnología. Aquí comparto mis proyectos personales y pequeños programas que he ido creando.</p>
        <div class="social-links">
          <a href="https://github.com/tu-usuario" target="_blank">GitHub</a>
        </div>
      </div>
    </section>
  </main>

  <footer>
    <div class="container">
      <p>&copy; 2026 Mi Portafolio</p>
    </div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
